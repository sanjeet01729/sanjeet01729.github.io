<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHive - Read Classic Books Offline</title>
    <style>
        :root {
            --bg-color: #120805; /* Deep rich library dark brown */
            --card-bg: #1a0f0a;
            --text-color: #ebdcd5;
            --accent-color: #f5a623; /* Gold */
            --accent-muted: #d09c6a;
            --border-color: #2d221e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 450px;
            width: 90%;
            margin: 20px auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
        }
        .logo-container {
            margin-bottom: 25px;
        }
        .logo-text {
            font-family: Georgia, serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 0;
            letter-spacing: 1px;
        }
        .logo-tagline {
            font-size: 0.85rem;
            opacity: 0.6;
            margin: 5px 0 0 0;
        }
        .book-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        .book-cover {
            width: 140px;
            height: 200px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            object-fit: cover;
            background-color: #221510;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .book-title {
            font-family: Georgia, serif;
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            color: #fff;
            line-height: 1.25;
        }
        .book-author {
            font-size: 1rem;
            color: var(--accent-muted);
            margin: 0 0 15px 0;
            font-style: italic;
        }
        .book-description {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.5;
            margin: 0;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
        }
        .btn {
            display: inline-block;
            width: 100%;
            background-color: var(--accent-color);
            color: #120805;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05rem;
            padding: 15px 0;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
            outline: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 166, 35, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .info-footer {
            margin-top: 25px;
            font-size: 0.8rem;
            opacity: 0.5;
            line-height: 1.4;
        }
        /* Loader styles while fetching book info */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(245, 166, 35, 0.2);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <h1 class="logo-text">BookHive</h1>
            <p class="logo-tagline">Your Offline Classic Library</p>
        </div>

        <div id="loader" class="spinner"></div>

        <div id="content" class="hidden">
            <div class="book-preview">
                <img id="cover" class="book-cover" src="" alt="Book Cover">
                <h2 id="title" class="book-title">Loading Title</h2>
                <p id="author" class="book-author">Loading Author</p>
                <p id="description" class="book-description"></p>
            </div>

            <button id="cta-button" class="btn">Read Free on BookHive</button>

            <p class="info-footer">
                BookHive lets you read classic literature offline with custom themes and tracked reading analytics.
            </p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const authorEl = document.getElementById('author');
        const descEl = document.getElementById('description');
        const button = document.getElementById('cta-button');

        // Fallback redirection link if no book details are loaded
        let playStoreUrl = "https://play.google.com/store/apps/details?id=com.bookhivem.app";

        if (bookId) {
            playStoreUrl += "&referrer=" + bookId;

            // Fetch metadata from CDN to display rich preview
            fetch('https://bookhive-content.pages.dev/metadata/books.json')
                .then(res => res.json())
                .then(books => {
                    const book = books.find(b => String(b.id) === String(bookId));
                    if (book) {
                        coverEl.src = book.cover_url || "https://bookhive-content.pages.dev/covers/default.jpg";
                        titleEl.innerText = book.title;
                        authorEl.innerText = "by " + book.author;
                        descEl.innerText = book.description || "No description available for this classic.";
                        
                        // Set page metadata dynamically
                        document.title = book.title + " - Read on BookHive";
                    } else {
                        showDefaultView();
                    }
                })
                .catch(err => {
                    console.error("Metadata load failed", err);
                    showDefaultView();
                })
                .finally(() => {
                    loader.classList.add('hidden');
                    content.classList.remove('hidden');
                });
        } else {
            showDefaultView();
            loader.classList.add('hidden');
            content.classList.remove('hidden');
        }

        function showDefaultView() {
            coverEl.src = "https://bookhive-content.pages.dev/covers/default.jpg"; // Default generic library cover
            titleEl.innerText = "Discover Classics";
            authorEl.innerText = "Read Offline Anywhere";
            descEl.innerText = "Explore thousands of free classic books offline with custom typography, font sizing, night modes, and personal reading analytics.";
        }

        // Handle CTA click: tries custom scheme, falls back to Google Play Store
        button.addEventListener('click', function() {
            if (bookId) {
                // Try opening App Link directly (custom scheme fallback just in case App Links aren't verified)
                window.location.href = "bookhive://book/" + bookId;
            }

            // Redirect to Play Store after a short delay (so if the app is installed, it opens; if not, it goes to store)
            setTimeout(function() {
                window.location.href = playStoreUrl;
            }, 1500);
        });
    </script>
</body>
</html>
